<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Unavailable</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Language -->
    <p class="language">English (UK)</p>

    <!-- Logo -->
    <div class="logo-area">
        <img src="logo.png" alt="Logo">
    </div>

    <!-- Error Section -->
    <div class="error-section">

        <div class="error-icon">
            ⚠️
        </div>

        <h2 class="error-title">
            We couldn't load this content
        </h2>

        <p class="error-message">
            This content may have been deleted, removed by its owner,
            or is no longer accessible.
        </p>

        <a href="https://www.instagram.com/" class="return-home">
            Return Home
        </a>

    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Language • Privacy • Terms • Help</p>
        <p>© Meta 2026</p>
    </div>

</div>

</body>
</html>
